name: CI

# ── Lean gate set (ADR-018 §5 / #52) ─────────────────────────────────────────
# The single quality workflow: the deterministic, environment-agnostic lean set
# — typecheck, eslint, token-pipeline validity, unit/type tests, app build +
# bundle budgets, consumer smoke (+ publint), Storybook build. No Playwright /
# browser lanes, no live-site fetches, no 56-gate check:full chain. Prettier is
# enforced pre-commit (lint-staged); the heavier/browser/network lanes
# (a11y, visual, responsive, collision, chromatic, figma-sync, llm-synthetic)
# are archived in .github/workflows-archive/ — recoverable, not deleted.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    name: Lean gate set
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Generated data files (src/app/data/*.json) are gitignored but imported
      # by source, so they must exist before typecheck/build. Regenerate here.
      - name: Generate data artifacts
        run: node scripts/generate-manifest.mjs && node scripts/generate-component-api.mjs && node scripts/enrich-manifest.mjs && node scripts/sync-icons.mjs && node scripts/audit-tokens.mjs --full

      - name: Typecheck
        run: pnpm typecheck

      - name: ESLint (zero warnings)
        run: pnpm lint --max-warnings=0

      - name: Token pipeline validity (verify-tokens + check-contrast)
        run: node scripts/verify-tokens.mjs && node scripts/check-contrast.mjs

      - name: Unit + contract tests (vitest)
        run: pnpm exec vitest run

      - name: App build
        run: pnpm build

      - name: Bundle budgets (size-limit)
        run: pnpm size-limit

      - name: Consumer smoke (build:lib + subpath resolution + publint + consumer typecheck)
        run: pnpm smoke:consumer

      - name: Storybook build
        run: pnpm build-storybook
